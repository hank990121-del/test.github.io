<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>問卷填答</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f3ea;
      --ink: #1f2933;
      --muted: #64707d;
      --line: #d8d2c4;
      --accent: #116466;
      --accent-dark: #0b4f51;
      --surface: #fffdf8;
      --shadow: 0 22px 60px rgba(31, 41, 51, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(145deg, rgba(17, 100, 102, 0.12), transparent 36%),
        linear-gradient(315deg, rgba(255, 183, 77, 0.16), transparent 34%),
        var(--bg);
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 18px;
    }

    .panel {
      width: min(100%, 560px);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: clamp(28px, 6vw, 48px);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 8vw, 4rem);
      line-height: 1.02;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    button {
      min-height: 52px;
      border: 0;
      border-radius: 8px;
      padding: 0 24px;
      color: #ffffff;
      background: var(--accent);
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(17, 100, 102, 0.24);
      transition: transform 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    button:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
      box-shadow: 0 16px 30px rgba(17, 100, 102, 0.28);
    }

    button:active {
      transform: translateY(0);
    }

    .status {
      min-height: 24px;
      font-size: 0.95rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <section class="panel" aria-labelledby="page-title">
      <h1 id="page-title">問卷填答</h1>
      <p>請點擊下方按鈕開始填答。</p>

      <div class="actions">
        <button type="button" id="startButton">開始填答</button>
        <span class="status" id="status" aria-live="polite"></span>
      </div>
    </section>
  </main>

  <script>
    const googleForms = [
      "https://docs.google.com/forms/d/e/1FAIpQLSeq7QzXcEszWDV5kTp7RthVhQnosdL-G88_x3Xf8IAWO6YCVg/viewform",
      "https://docs.google.com/forms/d/e/1FAIpQLSep73jA0pZUZd7n0eRDqDdWDVBjaaJk7JEf3YjT5FXddY_hwg/viewform",
      "https://docs.google.com/forms/d/e/1FAIpQLSfOQRjB3GjannlQ8UpYaewVrw8_jy0CZkC5yxf-ZEwz5zcwGg/viewform"
    ];

    const startButton = document.querySelector("#startButton");
    const statusText = document.querySelector("#status");

    startButton.addEventListener("click", () => {
      const randomIndex = Math.floor(Math.random() * googleForms.length);
      const selectedForm = googleForms[randomIndex];

      statusText.textContent = "正在開啟問卷...";
      window.location.href = selectedForm;
    });
  </script>
</body>
</html>
